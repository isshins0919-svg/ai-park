<!-- ============================================================
  mauri MANUKA HONEY LP — 速度最適化済みテンプレ
  最終更新: 2026-03-17

  【変更点サマリー】
  1. [HEAD] canonical 重複タグを1本に削減
  2. [HEAD] jQuery 3.6.0 の同期読み込みを削除（フッターで defer に統合）
  3. [HEAD] Google Fonts → media="print" onload で非同期化（レンダリングブロック解消）
  4. [HEAD] ヒーロー画像を <link rel="preload"> で先行取得
  5. [IMG]  ヒーロー画像1枚目（MNK_LP_top_banner）→ fetchpriority="high" で優先読み込み
  6. [IMG]  2枚目以降すべて → loading="lazy" + decoding="async" で遅延読み込み
  7. [IMG]  src属性のタブ文字（\t）を除去（fixed div の bottom.webp）
  8. [JS]   フッターの jQuery 2.2.4 → 削除（3.6.0 に一本化）
  9. [JS]   jQuery 3.6.0 / fade.js / popup.js → defer 属性で非同期化
  10.[JS]  html5shiv → 削除（IE8以下不要。必要なら戻してOK）
============================================================ -->


<!-- ============================================================
  HEAD（ここをECフォースのhead欄に貼る）
============================================================ -->

<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0">

<!-- ★改善① canonical 重複を1本に削減 -->

<link rel="icon" href="{{ file_root_path }}/image/cropped-logo-192x192.png" sizes="32x32">

<!-- ★改善② jQuery を HEAD から削除（フッターで defer 読み込みに統合） -->
<!-- 旧: <script src="https://code.jquery.com/jquery-3.6.0.js"></script> → 削除 -->

<!-- ★改善③ Google Fonts: media="print"→onload で非同期化（レンダリングブロック解消） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'">
<noscript>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
</noscript>

<!-- ★改善④ ヒーロー画像を preload で先行取得（LCP改善） -->
