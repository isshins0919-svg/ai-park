<!-- ★改善⑤ 動画の遅延読み込みスクリプト -->
<!-- ★★★ 動画URLを変更する場合はここの VIDEO_SOURCES を編集してください ★★★ -->
<script>
(function() {
  var VIDEO_SOURCES = {
    'video_lpo0_module':    'https://file.mysquadbeyond.com/uploads/article_photo/photo/6526862/600e93d2-980d-4e70-a656-c67190a2c107.mp4',
    'video_lpo1_module':    'https://file.mysquadbeyond.com/uploads/article_photo/photo/6526832/7f1c94f0-73e0-4040-873b-05c00d82989e.mp4',
    'video_lpo2_module':    'https://file.mysquadbeyond.com/uploads/article_photo/photo/6526833/7c1f259b-32b2-4e6f-a1c2-af7a5d0e9108.mp4',
    'video_lpo3_module':    'https://file.mysquadbeyond.com/uploads/article_photo/photo/6526834/24b98c01-eee4-472c-a290-06a1e022a546.mp4',
    'video_lpo4_module':    'https://file.mysquadbeyond.com/uploads/article_photo/photo/6526959/613078be-dc8c-4be3-a1a3-ea8a69a602fd.mp4',
    'video_standalone_module': 'https://file.mysquadbeyond.com/uploads/article_photo/photo/6526835/7004dc1a-bae0-4400-b8ba-dbc28a576aa2.mp4'
  };

  var targets = [];
  Object.keys(VIDEO_SOURCES).forEach(function(cls) {
    var el = document.querySelector('.' + cls);
    if (el) targets.push({ el: el, cls: cls });
  });
  if (!targets.length) return;

  function loadVideo(el, cls) {
    el.src = VIDEO_SOURCES[cls];
    el.load();
    el.play().catch(function() {});
    var placeholder = el.parentNode.querySelector('img');
    if (placeholder) placeholder.style.display = 'none';
  }

  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var cls = Object.keys(VIDEO_SOURCES).filter(function(c) {
          return entry.target.classList.contains(c);
        })[0];
        if (cls) {
          loadVideo(entry.target, cls);
          obs.unobserve(entry.target);
        }
      });
    }, { rootMargin: '200px 0px' });
    targets.forEach(function(t) { obs.observe(t.el); });
  } else {
    targets.forEach(function(t) { loadVideo(t.el, t.cls); });
  }
})();
</script>

<!-- タイマー・スクロール制御（変更なし） -->
<script>
(function () {
  const LIMIT_MIN = 20;
  const PREFIX      = "offer_timer_proust-cream2_v7-5";
  const REMAIN_KEY  = PREFIX + "remainSec";
  const EXPIRE_URL = "https://shop.rmh.co.jp/lp?u=me_proust2_cartsingle";

  if (location.search.includes("reset=1")) {
    localStorage.removeItem(REMAIN_KEY);
  }

  const DEFAULT_SEC = LIMIT_MIN * 60;
  let remainSec = parseInt(localStorage.getItem(REMAIN_KEY), 10);
  if (isNaN(remainSec) || remainSec < 0 || remainSec > DEFAULT_SEC) {
    remainSec = DEFAULT_SEC;
    localStorage.setItem(REMAIN_KEY, String(remainSec));
  }

  let timerId = null;

  function render() {
    const lpTimers = document.querySelectorAll(".lp-timer, #lp-timer");
    const chatTimer = document.getElementById("chat-header-timer");
    const sec = Math.max(remainSec, 0);
    const m = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    const text = `残り時間 ${m}分${s}秒`;
    lpTimers.forEach(el => { el.textContent = text; });
    if (chatTimer) chatTimer.textContent = text;
  }

  function stopTick() {
    if (timerId !== null) { clearInterval(timerId); timerId = null; }
  }

  function handleExpire() {
    remainSec = 0;
    localStorage.setItem(REMAIN_KEY, "0");
    render();
    stopTick();
    window.location.href = EXPIRE_URL;
  }

  function startTick() {
    if (timerId !== null) return;
    if (remainSec <= 0) { handleExpire(); return; }
    timerId = setInterval(function () {
      if (document.hidden) return;
      remainSec -= 1;
      if (remainSec <= 0) { handleExpire(); return; }
      localStorage.setItem(REMAIN_KEY, String(remainSec));
      render();
    }, 1000);
  }

  render();
  if (remainSec <= 0) { handleExpire(); return; }
  if (!document.hidden) { startTick(); }
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) { stopTick(); } else { startTick(); }
  });
})();
</script>

<script>
(function () {
  let doneOnce = false;
  let savedY = null;
  let armed = false;

  function isConfirmCloseButton(btn) {
    if (!btn) return false;
    const dialog = btn.closest('.q-dialog');
    if (!dialog) return false;
    const dialogText = (dialog.innerText || '').trim();
    if (!dialogText.includes('本当に閉じますか？')) return false;
    const btnText = (btn.innerText || '').trim();
    return btnText === '閉じる';
  }

  function restoreScrollOnce() {
    if (savedY == null) return;
    const y = savedY;
    doneOnce = true; armed = false; savedY = null;
    try { document.activeElement && document.activeElement.blur && document.activeElement.blur(); } catch (_) {}
    requestAnimationFrame(() => window.scrollTo(0, y));
    setTimeout(() => window.scrollTo(0, y), 50);
    setTimeout(() => window.scrollTo(0, y), 150);
    try { mo.disconnect(); } catch (_) {}
  }

  document.addEventListener('click', (e) => {
    if (doneOnce) return;
    const btn = e.target.closest('button');
    if (!isConfirmCloseButton(btn)) return;
    savedY = window.scrollY; armed = true;
    try { btn.blur && btn.blur(); } catch (_) {}
    try { document.activeElement && document.activeElement.blur && document.activeElement.blur(); } catch (_) {}
  }, true);

  const mo = new MutationObserver(() => {
    if (doneOnce || !armed) return;
    const stillConfirmDialog = Array.from(document.querySelectorAll('.q-dialog'))
      .some(d => (d.innerText || '').includes('本当に閉じますか？'));
    if (!stillConfirmDialog) { restoreScrollOnce(); }
  });
  mo.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>

<script>
(function () {
  let reentry = false;

  function isFinalSurveyYesNo(a) {
    if (!a) return false;
    if (a.getAttribute('href') !== '#chatform') return false;
    if (!a.closest('.anq_box')) return false;
    const cls = a.className || '';
    return cls.includes('btn5') && cls.includes('btn--cubic');
  }

  document.addEventListener('click', (e) => {
    const a = e.target.closest('a');
    if (!isFinalSurveyYesNo(a)) return;
    if (reentry) return;
    e.preventDefault();
    window.scrollTo(0, 0);
    reentry = true;
    try {
      a.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, view: window }));
    } finally {
      reentry = false;
    }
    requestAnimationFrame(() => window.scrollTo(0, 0));
    setTimeout(() => window.scrollTo(0, 0), 50);
    setTimeout(() => window.scrollTo(0, 0), 150);
  }, true);
})();
</script>
