<!-- ============================================================
  on:myskin face v112 LP — 最小限最適化版（HEAD/FOOTERのみ）
  最終更新: 2026-03-17

  【方針】BODYは元のLPをそのまま使う。低リスクな改善だけ適用。

  【変更点】
  HEAD:
  1. jQuery 3.6.0.js（非圧縮）→ .min.js（288KB → 87KB）
  2. [追加] ヒーロー画像 preload + fetchpriority="high"（LCP改善）
  3. [追加] CloudFront / ytimg preconnect & dns-prefetch
  FOOTER:
  4. jQuery 2.2.4（重複）→ 削除
  5. fade.js / popup.js → defer 追加
  6. html5shiv → 削除（IE8専用・2026年不要）

============================================================ -->

<!-- ★改善① jQuery: 非圧縮版 → 圧縮版（288KB → 87KB）defer は外す（ECフォース依存のため） -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Google Tag Manager（変更なし） -->

<link rel="preload" as="image"
  href="{{ file_root_path }}/image/onmyskin-face/lp/v108/OMS_F_LPbanner_timer.webp"

<link rel="dns-prefetch" href="//i.ytimg.com">
<link rel="dns-prefetch" href="//www.youtube.com">
<link rel="dns-prefetch" href="//www.googletagmanager.com">
