        <script>
(function(){
  const wrapper = document.currentScript.previousElementSibling;
  if (!wrapper || !wrapper.classList.contains("ytframe-wrapper")) return;
  const track = wrapper.querySelector(".ytframe-track");
  const prevBtn = wrapper.querySelector(".ytframe-left");
  const nextBtn = wrapper.querySelector(".ytframe-right");
  if (!track || !prevBtn || !nextBtn) return;
  if (track.dataset.inited === "1") return;
  track.dataset.inited = "1";
  let locked = false;
  const forceReflow = () => track.offsetHeight;
  const getThumbUrl = (id) => `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
  const renderVideoThumb = (slide) => {
    const id = slide.getAttribute("data-video-id");
    const thumbMode = slide.getAttribute("data-thumb");
    if (!id || thumbMode !== "YT") return;
    if (slide.querySelector("img")) return;
    const thumb = getThumbUrl(id);
    slide.innerHTML = `<img src="${thumb}" alt=""><button class="ytframe-play" type="button" aria-label="再生">▶</button>`;
  };
  track.querySelectorAll(".ytframe-slide.video-slide").forEach(renderVideoThumb);
  const resetAnyPlaying = () => {
    const playing = track.querySelector(".ytframe-slide.is-playing");
    if (!playing) return;
    playing.classList.remove("is-playing");
    const id = playing.getAttribute("data-video-id");
    const thumbMode = playing.getAttribute("data-thumb");
    if (id && thumbMode === "YT") {
      const thumb = getThumbUrl(id);
      playing.innerHTML = `<img src="${thumb}" alt=""><button class="ytframe-play" type="button" aria-label="再生">▶</button>`;
    }
  };
  const goNext = () => {
    if (locked) return; locked = true; resetAnyPlaying();
    track.classList.add("is-anim"); track.style.transform = "translateX(-100%)";
    const onEnd = (e) => {
      if (e.target !== track) return;
      track.removeEventListener("transitionend", onEnd);
      track.classList.remove("is-anim"); track.classList.add("no-anim");
      track.appendChild(track.firstElementChild); track.style.transform = "translateX(0)";
      forceReflow(); track.classList.remove("no-anim"); locked = false;
    };
    track.addEventListener("transitionend", onEnd);
  };
  const goPrev = () => {
    if (locked) return; locked = true; resetAnyPlaying();
    track.classList.add("no-anim");
    track.insertBefore(track.lastElementChild, track.firstElementChild);
    track.style.transform = "translateX(-100%)"; forceReflow();
    track.classList.remove("no-anim"); track.classList.add("is-anim"); track.style.transform = "translateX(0)";
    const onEnd = (e) => {
      if (e.target !== track) return;
      track.removeEventListener("transitionend", onEnd); track.classList.remove("is-anim"); locked = false;
    };
    track.addEventListener("transitionend", onEnd);
  };
  prevBtn.addEventListener("click", goPrev);
  nextBtn.addEventListener("click", goNext);
  wrapper.addEventListener("click", (e) => {
    const btn = e.target.closest(".ytframe-play");
    if (!btn) return;
    const slide = btn.closest(".video-slide");
    if (!slide) return;
    const id = slide.getAttribute("data-video-id");
    if (!id) return;
    const src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
    slide.classList.add("is-playing");
    slide.innerHTML = `<iframe src="${src}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
  });
})();
        </script>

      forceReflow(); track.classList.remove("no-anim"); locked = false;

    track.addEventListener("transitionend", onEnd);

  const goPrev = () => {
    if (locked) return; locked = true;
    track.classList.add("no-anim");
    track.insertBefore(track.lastElementChild, track.firstElementChild);

<script>
(function () {
  const LIMIT_MIN = 20;
  const PREFIX      = "offer_timer_onmyskin-face_v112_vtbuddiis";
  const REMAIN_KEY  = PREFIX + "remainSec";
  const EXPIRE_URL = "https://shop.rmh.co.jp/lp?u=me_onmyskin-face_cartsingle";
  if (location.search.includes("reset=1")) { localStorage.removeItem(REMAIN_KEY); }
  const DEFAULT_SEC = LIMIT_MIN * 60;
  let remainSec = parseInt(localStorage.getItem(REMAIN_KEY), 10);
  if (isNaN(remainSec) || remainSec < 0 || remainSec > DEFAULT_SEC) {
    remainSec = DEFAULT_SEC;
    localStorage.setItem(REMAIN_KEY, String(remainSec));
  }
  let timerId = null;
  function render() {
    const lpTimers = document.querySelectorAll(".lp-timer, #lp-timer");
    const chatTimer = document.getElementById("chat-header-timer");
    const sec = Math.max(remainSec, 0);
    const m = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    const text = `残り時間 ${m}分${s}秒`;
    lpTimers.forEach(el => { el.textContent = text; });
    if (chatTimer) chatTimer.textContent = text;
  }
  function stopTick() { if (timerId !== null) { clearInterval(timerId); timerId = null; } }
  function handleExpire() {
    remainSec = 0; localStorage.setItem(REMAIN_KEY, "0"); render(); stopTick();
    window.location.href = EXPIRE_URL;
  }
  function startTick() {
    if (timerId !== null) return;
    if (remainSec <= 0) { handleExpire(); return; }
    timerId = setInterval(function () {
      if (document.hidden) return;
      remainSec -= 1;
      if (remainSec <= 0) { handleExpire(); return; }
      localStorage.setItem(REMAIN_KEY, String(remainSec));
      render();
    }, 1000);
  }
  render();
  if (remainSec <= 0) { handleExpire(); return; }
  if (!document.hidden) { startTick(); }
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) { stopTick(); } else { startTick(); }
  });
})();
</script>
