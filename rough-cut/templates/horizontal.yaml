# rough-cut 横型動画設定 (16:9)
# YouTube / ビジネス動画 向け

project:
  name: ""
  speaker: ""
  description: ""

text_rules:
  enumeration_style: "as_is"
  known_terms: []
  corrections: {}

telop:
  max_chars_per_line: 16
  max_lines_per_page: 2
  animation_in: "none"
  animation_out: "none"
  y_position: 0.85        # 横型は0.88超禁止 (UIに隠れる)
  font_size: 44

render:
  fps: 30
  width: 1920
  height: 1080
  video_fit: "cover"
  framing:
    scale: 1.0
    offset_y: 0

edit:
  max_gap_ms: 600
  segment_padding_ms: 50
  filler_confidence_threshold: 0.6

# BudouX DP ペナルティ (横型最適化)
dp:
  widow: 1.5             # 横型は1行テロップも許容
  kinsoku: 10.0          # 横型は幅に余裕あり
  anchor_bonus: 1.5
  page_lone: 1.5         # 横型は1行ページも自然
  page_end: 1.0
  line_max_ratio: 1.3    # 行長のばらつきを抑制
  page_max_ratio: 1.3
