name: Slack 記事フィードバックBot

on:
  schedule:
    - cron: '*/15 * * * *'   # 15分おきに実行（無料枠内: 約2900分/月）
  workflow_dispatch:           # 手動実行も可能

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # state.json をコミットバックするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.claude/scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r .claude/scripts/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run bot (1回実行)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .claude/scripts/run_once.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/scripts/slack_feedback_state.json
          git diff --staged --quiet || git commit -m "bot: update slack feedback state [skip ci]"
          git push
