<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さくら投稿ダッシュボード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#d4a96a;--pink:#e89bb0;--deep:#0d0b18;--card-bg:rgba(255,255,255,0.04);--text:#f0ece8;--muted:#9990a8;--border:rgba(212,169,106,0.18);--green:#7ecba1;--red:#e89090}
  body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;line-height:1.7;padding:40px 24px;max-width:1100px;margin:0 auto}
  .header{text-align:center;border-bottom:1px solid var(--border);padding-bottom:32px;margin-bottom:40px}
  .tag{font-size:10px;letter-spacing:4px;color:var(--pink)}
  h1{font-family:'Noto Serif JP',serif;font-size:36px;font-weight:300;color:#f8f4f0;margin:12px 0}
  .subtitle{font-size:12px;color:#3a3550;letter-spacing:3px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:32px}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:20px;transition:border-color 0.3s}
  .card:hover{border-color:rgba(212,169,106,0.4)}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .card-num{font-size:11px;letter-spacing:2px;color:var(--gold)}
  .card-status{font-size:9px;padding:3px 10px;border-radius:12px;letter-spacing:1px}
  .status-ready{background:rgba(126,203,161,0.15);color:var(--green);border:1px solid rgba(126,203,161,0.3)}
  .status-warn{background:rgba(232,168,85,0.15);color:#e8a855;border:1px solid rgba(232,168,85,0.3)}
  .status-error{background:rgba(232,144,144,0.15);color:var(--red);border:1px solid rgba(232,144,144,0.3)}
  .card-title{font-family:'Noto Serif JP',serif;font-size:17px;color:#f8f4f0;margin-bottom:8px;line-height:1.5}
  .card-type{font-size:10px;color:var(--pink);margin-bottom:14px;letter-spacing:1px}
  .thumb{width:100%;aspect-ratio:9/16;background:#1a1525;border-radius:8px;margin-bottom:14px;overflow:hidden;position:relative}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb video{width:100%;height:100%;object-fit:cover}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;font-size:11px}
  .metric{background:rgba(0,0,0,0.25);padding:8px 10px;border-radius:6px}
  .metric-label{color:var(--muted);font-size:9px;letter-spacing:1px;display:block;margin-bottom:2px}
  .metric-value{color:var(--gold);font-family:monospace}
  .schedule{background:rgba(232,155,176,0.08);border:1px solid rgba(232,155,176,0.2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
  .sched-label{font-size:9px;color:var(--pink);letter-spacing:1px;margin-bottom:2px}
  .sched-time{font-size:13px;color:#f0ece8;font-weight:500}
  .desc{background:rgba(0,0,0,0.25);padding:10px 12px;border-radius:6px;font-size:11px;color:#b0acb8;line-height:1.6;margin-bottom:10px}
  .hashtags{font-size:10px;color:var(--gold);margin-bottom:12px;line-height:1.5}
  .action-btn{display:block;background:rgba(212,169,106,0.12);border:1px solid rgba(212,169,106,0.3);color:var(--gold);padding:8px 12px;border-radius:8px;text-align:center;font-size:11px;letter-spacing:1px;margin-top:8px;text-decoration:none;cursor:pointer}
  .action-btn:hover{background:rgba(212,169,106,0.2)}
  .summary{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:32px}
  .summary-title{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:14px}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .sum-item{text-align:center}
  .sum-val{font-family:'Noto Serif JP',serif;font-size:28px;color:#f8f4f0;font-weight:300}
  .sum-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px}
</style>
</head>
<body>

<div class="header">
  <p class="tag">POST DASHBOARD</p>
  <h1>さくら 投稿ダッシュボード</h1>
  <p class="subtitle">{{session_date}} — READY TO POST</p>
</div>

<div class="summary">
  <p class="summary-title">STATUS OVERVIEW</p>
  <div class="summary-grid">
    <div class="sum-item"><div class="sum-val">{{total_scripts}}</div><div class="sum-lbl">TOTAL SCRIPTS</div></div>
    <div class="sum-item"><div class="sum-val">{{ready_count}}</div><div class="sum-lbl">READY TO POST</div></div>
    <div class="sum-item"><div class="sum-val">{{warn_count}}</div><div class="sum-lbl">WARNINGS</div></div>
    <div class="sum-item"><div class="sum-val">{{avg_score}}</div><div class="sum-lbl">AVG QUALITY</div></div>
  </div>
</div>

<div class="grid">
  {{cards}}
</div>

<p style="font-size:10px;color:#3a3550;margin-top:48px;text-align:center;letter-spacing:1px">Generated by sns-marketer v2.0 / 天才SNSマーケター君</p>

</body>
</html>
